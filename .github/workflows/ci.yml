name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  notebooks:
    name: notebooks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        shell: bash -el {0}   # login shell so the micromamba env stays activated
    steps:
      - uses: actions/checkout@v4

      - name: Set up conda env (imwa2026)
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true

      - name: Install test dependencies
        run: python -m pip install -r tests/requirements-test.txt

      - name: Make solver/PEST binaries executable (unix)
        if: runner.os != 'Windows'
        run: chmod +x tutorial/bin/linux/* tutorial/bin/mac/* || true

      - name: Diagnose mf6rtm / libmf6 load
        run: |
          python -c "import numpy; print('numpy', numpy.__version__)"
          python -c "import phreeqcrm; print('phreeqcrm', phreeqcrm.__file__)"
          python -c "import modflowapi, xmipy; print('modflowapi', modflowapi.__version__)"
          case "${{ runner.os }}" in
            Linux)   L=tutorial/bin/linux/libmf6.so ; ldd "$L" | grep -i 'not found' || echo 'ldd: all deps resolved' ;;
            macOS)   L=tutorial/bin/mac/libmf6.dylib ; otool -L "$L" || true ;;
            Windows) L=tutorial/bin/win/libmf6.dll ;;
          esac
          python -c "import ctypes,sys; ctypes.CDLL(sys.argv[1]); print('libmf6 loaded OK')" "$L"
        continue-on-error: false

      - name: Put the OS-specific binaries on PATH
        run: |
          case "${{ runner.os }}" in
            Linux)   echo "$PWD/tutorial/bin/linux" >> "$GITHUB_PATH" ;;
            macOS)   echo "$PWD/tutorial/bin/mac"   >> "$GITHUB_PATH" ;;
            Windows) echo "$PWD/tutorial/bin/win"   >> "$GITHUB_PATH" ;;
          esac

      - name: Run notebooks (scaled, in order)
        run: ./tests/run_tests.sh

